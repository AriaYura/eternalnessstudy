<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — 常世の繭</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ead6;
      --ink: #1a1208;
      --ink-light: #5a4e3a;
      --stamp: #8b1a1a;
      --rule: rgba(26,18,8,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Shippori Mincho', serif;
    }

    /* ── Kamon（fixed top-left） ── */
    .kamon-fixed {
      position: fixed;
      top: 1.2rem;
      left: 1.4rem;
      z-index: 100;
      width: 36px;
      height: 36px;
      opacity: 0.75;
      transition: opacity 0.2s;
      display: block;
    }
    .kamon-fixed:hover { opacity: 1; }

    /* ── Running head ── */
    .running-head {
      padding: 2rem 2rem 0;
      text-align: center;
    }

    .running-head__title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .running-head__title:hover { opacity: 1; }

    /* ── Article ── */
    .article {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    .article__title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.3;
      margin-bottom: 2.5rem;
    }

    .article__rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 2.5rem;
    }

    .article__body p {
      font-size: 1rem;
      line-height: 2.1;
      letter-spacing: 0.04em;
      margin-bottom: 1.8rem;
      text-align: justify;
    }

    .article__colophon {
      text-align: center;
      margin-top: 4rem;
      color: var(--ink-light);
      opacity: 0.5;
      letter-spacing: 0.3em;
      font-size: 0.85rem;
    }

    .scene-break{
        margin: 2rem 0;
    }

    .scene-break__symbol{
        color: var(--ink);
        opacity: 0.4;
        letter-spacing: 0.3em;
        font-size: 0.85rem;
    }

    /* ── Footer ── */
    .post-footer {
      text-align: center;
      padding: 2rem 2rem 4rem;
    }

    .post-footer__back {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .post-footer__back:hover { opacity: 1; }
  </style>
</head>
<body>

  <a class="kamon-fixed" href="{{ site.baseurl }}/">
    <img src="{{ site.baseurl }}/kamon.svg" alt="常世の繭" width="36" height="36">
  </a>

  <header class="running-head">
    <a class="running-head__title" href="{{ site.baseurl }}/">常世の繭</a>
  </header>

  <article class="article">
    <h1 class="article__title">{{ page.title }}</h1>
    <hr class="article__rule">
    <div class="article__body">
      {{ content }}
    </div>
    <div class="article__colophon">— ◆ —</div>
  </article>

  <footer class="post-footer">
    <a class="post-footer__back" href="{{ site.baseurl }}/catalog/">目録へ戻る</a>
  </footer>

</body>
</html>
