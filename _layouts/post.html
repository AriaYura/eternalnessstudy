<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — 常世の繭</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ead6;
      --ink: #1a1208;
      --ink-light: #5a4e3a;
      --stamp: #8b1a1a;
      --rule: rgba(26,18,8,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Shippori Mincho', serif;
      min-height: 100dvh;
      overscroll-behavior-y: contain;
    }

    /* ── Running head ── */
    .running-head {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      padding: 0 2.5rem;
      height: 36px;
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;
    }

    .running-head__kamon {
      width: 18px;
      height: 18px;
      opacity: 0.65;
      transition: opacity 0.2s;
      display: block;
    }
    .running-head__kamon:hover { opacity: 1; }

    .running-head__back {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
      text-align: center;
    }
    .running-head__back:hover { opacity: 1; }

    /* ── Article ── */
    .article {
      max-width: 680px;
      margin: 0 auto;
      padding: 4.5rem 2rem 6rem;
    }

    .article__title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.3;
      margin-bottom: 2.5rem;
    }

    .article__rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 2.5rem;
    }

    .article__body p {
      font-size: 1rem;
      line-height: 2.1;
      letter-spacing: 0.04em;
      margin-bottom: 1.8rem;
      text-align: justify;
    }

    .article__colophon {
      text-align: center;
      margin-top: 4rem;
      color: var(--ink-light);
      opacity: 0.5;
      letter-spacing: 0.3em;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header class="running-head">
    <a href="{{ site.baseurl }}/">
      <img class="running-head__kamon" src="{{ site.baseurl }}/kamon.svg" alt="常世の繭">
    </a>
    <a class="running-head__back" href="{{ site.baseurl }}/">目録へ戻る</a>
    <span></span>
  </header>

  <article class="article">
    <h1 class="article__title">{{ page.title }}</h1>
    <hr class="article__rule">
    <div class="article__body">
      {{ content }}
    </div>
    <div class="article__colophon">— ◆ —</div>
  </article>

</body>
</html>
