<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ page.collection_title }} — 常世の繭</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ead6;
      --ink: #1a1208;
      --ink-light: #5a4e3a;
      --stamp: #8b1a1a;
      --rule: rgba(26,18,8,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Shippori Mincho', serif;
    }

    /* ── Kamon（fixed top-left） ── */
    .kamon-fixed {
      position: fixed;
      top: 1.2rem;
      left: 1.4rem;
      z-index: 100;
      width: 36px;
      height: 36px;
      opacity: 0.75;
      transition: opacity 0.2s;
      display: block;
    }
    .kamon-fixed:hover { opacity: 1; }

    /* ── Running head ── */
    .running-head {
      padding: 2rem 2rem 0;
      text-align: center;
    }

    .running-head__title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      opacity: 0.7;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .running-head__title:hover { opacity: 1; }

    /* ── Article ── */
    .article {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 2rem;
    }

    .article__collection {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--ink-light);
      text-decoration: none;
      opacity: 0.65;
      display: inline-block;
      margin-bottom: 0.6rem;
      transition: opacity 0.2s;
    }
    .article__collection:hover { opacity: 1; }

    .article__title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.3;
      margin-bottom: 2.5rem;
    }

    .article__rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 2.5rem;
    }

    .article__body p {
      font-size: 1rem;
      line-height: 2.1;
      letter-spacing: 0.04em;
      margin-bottom: 1.8rem;
      text-align: justify;
    }

    .article__colophon {
      text-align: center;
      margin-top: 4rem;
      color: var(--ink-light);
      opacity: 0.5;
      letter-spacing: 0.3em;
      font-size: 0.85rem;
    }

    /* ── Chapter navigation ── */
    .chapter-nav {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
    }

    .chapter-nav__prev,
    .chapter-nav__next {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      text-decoration: none;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .chapter-nav__prev:hover,
    .chapter-nav__next:hover { opacity: 1; }

    .chapter-nav__prev { text-align: left; }
    .chapter-nav__next { text-align: right; }

    .chapter-nav__prev::before { content: '← '; }
    .chapter-nav__next::after  { content: ' →'; }

    .chapter-nav__empty { display: block; }

    .chapter-nav__catalog {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      text-decoration: none;
      opacity: 0.5;
      text-align: center;
      transition: opacity 0.2s;
    }
    .chapter-nav__catalog:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <a class="kamon-fixed" href="{{ site.baseurl }}/">
    <img src="{{ site.baseurl }}/kamon.svg" alt="常世の繭" width="36" height="36">
  </a>

  <header class="running-head">
    <a class="running-head__title" href="{{ site.baseurl }}/catalog/">常世の繭</a>
  </header>

  <article class="article">
    <a class="article__collection" href="{{ site.baseurl }}{{ page.collection_url }}">{{ page.collection_title }}</a>
    <h1 class="article__title">{{ page.title }}</h1>
    <hr class="article__rule">
    <div class="article__body">
      {{ content }}
    </div>
    <div class="article__colophon">— ◆ —</div>
  </article>

  <nav class="chapter-nav">
    {% if page.prev %}
      <a class="chapter-nav__prev" href="{{ site.baseurl }}{{ page.prev }}">前章</a>
    {% else %}
      <span class="chapter-nav__empty"></span>
    {% endif %}

    <a class="chapter-nav__catalog" href="{{ site.baseurl }}/catalog/">目録へ</a>

    {% if page.next %}
      <a class="chapter-nav__next" href="{{ site.baseurl }}{{ page.next }}">次章</a>
    {% else %}
      <span class="chapter-nav__empty"></span>
    {% endif %}
  </nav>

</body>
</html>
