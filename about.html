<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書庫について — 常世の繭</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f0ead6;
    --paper-aged: #d4c9a8;
    --ink: #1a1208;
    --ink-faded: #3d3020;
    --ink-light: #6b5d45;
    --ink-very-light: #9e8f78;
    --red-seal: #8b1a1a;
    --border: #c4b99a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--paper);
    color: var(--ink);
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    min-height: 100vh;
  }
  .page-wrapper { max-width: 720px; margin: 0 auto; padding: 0 2rem; }
  header { border-bottom: 1px solid var(--border); padding: 3rem 0 2rem; }
  .site-title {
    font-family: 'Zen Old Mincho', serif;
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: -0.1em;
    line-height: 1;
    color: var(--ink);
    text-decoration: none;
    display: block;
  }
  .site-subtitle { font-size: 0.75rem; color: var(--ink-light); letter-spacing: 0.2em; margin-top: 0.5rem; font-weight: 300; }
  nav { padding: 1rem 0; display: flex; gap: 2rem; border-bottom: 1px solid var(--border); }
  nav a { font-size: 0.8rem; color: var(--ink-light); text-decoration: none; letter-spacing: 0.15em; transition: color 0.2s; position: relative; }
  nav a:hover { color: var(--ink); }
  nav a::after { content: '◆'; position: absolute; right: -1.25rem; font-size: 0.4rem; color: var(--border); top: 50%; transform: translateY(-50%); }
  nav a:last-child::after { display: none; }
  main { padding: 3rem 0 4rem; }
  .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
  .section-label { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--ink-very-light); }
  .section-rule { flex: 1; height: 1px; background: var(--border); }
  .about-body { font-size: 0.9rem; line-height: 2.4; color: var(--ink-faded); letter-spacing: 0.06em; }
  .about-body p { margin-bottom: 1.8rem; }
  footer { border-top: 1px solid var(--border); padding: 2rem 0; text-align: center; }
  .footer-text { font-size: 0.7rem; color: var(--ink-very-light); letter-spacing: 0.2em; }
</style>
</head>
<body>
<div class="page-wrapper">
  <header>
    <a href="/eternalnessstudy/" class="site-title">常世の繭</a>
    <p class="site-subtitle">とこよのまゆ　— 創作文庫</p>
  </header>
  <nav>
    <a href="/eternalnessstudy/">目録</a>
    <a href="/eternalnessstudy/about.html">書庫について</a>
  </nav>
  <main>
    <div class="section-header">
      <span class="section-label">書庫について</span>
      <div class="section-rule"></div>
    </div>
    <div class="about-body">
      <p>常世の繭は、個人創作の小説を収める私的な文庫です。</p>
      <p>推理の表層と、その下に流れる命運の物語。<br>
      時間回転、常世、人鬼情未了——<br>
      ここに収められるのは、そのような境界の物語です。</p>
    </div>
  </main>
  <footer>
    <p class="footer-text">常世の繭　— 私的文庫</p>
  </footer>
</div>
</body>
</html>
